<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subir Plantilla de Empleados</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f9; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 450px; }
        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: #333; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: .5rem; font-weight: bold; }
        input[type="text"], input[type="file"] { width: 100%; padding: .5rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #4CAF50; color: white; padding: .75rem 1rem; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-size: 1rem; margin-top: 1rem; }
        button:hover { background-color: #45a049; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        
        #progressContainer { margin-top: 1.5rem; display: none; }
        .progress-label { display: flex; justify-content: space-between; margin-bottom: 0.5rem; font-size: 0.9rem; }
        .progress-bar-bg { background-color: #eee; border-radius: 10px; height: 20px; width: 100%; overflow: hidden; }
        .progress-bar-fill { background-color: #4CAF50; height: 100%; width: 0%; transition: width 0.3s ease; }
        
        #message { margin-top: 1rem; padding: .5rem; border-radius: 4px; display: none; font-size: 0.9rem; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background-color: #e2f3f5; color: #0c5460; border: 1px solid #bee5eb; }

        .links { margin-top: 2rem; text-align: center; border-top: 1px solid #eee; padding-top: 1rem; }
        .links a { color: #007bff; text-decoration: none; font-size: 0.9rem; }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Subir Plantilla Quincenal</h1>
        <form id="uploadForm">
            <div class="form-group">
                <label for="periodo">Periodo (Ej. 2024-Marzo-Q1):</label>
                <input type="text" id="periodo" name="periodo" placeholder="Opcional">
            </div>
            <div class="form-group">
                <label for="file">Archivo Excel:</label>
                <input type="file" id="file" name="file" accept=".xlsx,.xls,.csv" required>
            </div>
            <button type="submit" id="submitBtn">Importar Datos</button>
        </form>

        <div id="progressContainer">
            <div class="progress-label">
                <span id="statusText">Procesando...</span>
                <span id="percentText">0%</span>
            </div>
            <div class="progress-bar-bg">
                <div id="progressBarFill" class="progress-bar-fill"></div>
            </div>
            <div id="countText" style="font-size: 0.8rem; color: #666; margin-top: 0.3rem; text-align: right;">0 / 0 filas</div>
        </div>

        <div id="message"></div>

        <div class="links">
            <a href="/search.html">🔍 Ir al buscador de empleados</a>
        </div>
    </div>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const submitBtn = document.getElementById('submitBtn');
            const progressContainer = document.getElementById('progressContainer');
            const progressBarFill = document.getElementById('progressBarFill');
            const percentText = document.getElementById('percentText');
            const statusText = document.getElementById('statusText');
            const countText = document.getElementById('countText');
            const messageDiv = document.getElementById('message');

            // Preparar UI
            submitBtn.disabled = true;
            messageDiv.style.display = 'none';
            progressContainer.style.display = 'block';
            progressBarFill.style.width = '0%';
            percentText.textContent = '0%';
            statusText.textContent = 'Subiendo archivo...';
            countText.textContent = '0 / 0';

            // Generar ID único para esta importación
            const importId = 'imp_' + Date.now() + '_' + Math.floor(Math.random() * 1000);
            formData.append('import_id', importId);

            let pollingInterval;

            // Función para actualizar progreso
            const updateProgress = async () => {
                try {
                    const res = await fetch(`/api/employees/import-status/${importId}`);
                    if (res.ok) {
                        const data = await res.json();
                        if (data.status === 'processing' || data.status === 'completed') {
                            const percent = Math.round((data.current / data.total) * 100) || 0;
                            progressBarFill.style.width = percent + '%';
                            percentText.textContent = percent + '%';
                            countText.textContent = `${data.current} / ${data.total} filas`;
                            statusText.textContent = data.status === 'completed' ? 'Finalizado' : 'Procesando Excel...';
                            
                            if (data.status === 'completed') {
                                clearInterval(pollingInterval);
                            }
                        }
                    }
                } catch (err) {
                    console.error("Error polling progress", err);
                }
            };

            // Iniciar polling
            pollingInterval = setInterval(updateProgress, 1000);

            try {
                const response = await fetch('/api/employees/import', {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'Accept': 'application/json'
                    }
                });

                const result = await response.json();
                clearInterval(pollingInterval);
                
                // Asegurar que el progreso llegue al 100% al final
                progressBarFill.style.width = '100%';
                percentText.textContent = '100%';

                if (response.ok) {
                    messageDiv.textContent = result.message || '¡Éxito! Importación completada.';
                    messageDiv.className = 'success';
                } else {
                    messageDiv.textContent = 'Error: ' + (result.message || JSON.stringify(result));
                    messageDiv.className = 'error';
                }
            } catch (error) {
                clearInterval(pollingInterval);
                messageDiv.textContent = 'Error de conexión: ' + error.message;
                messageDiv.className = 'error';
            } finally {
                messageDiv.style.display = 'block';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
